stages:
  - build
  - deploy

.node_cache: &node_cache
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/

.build_template: &build_template
  stage: build
  image: node:20-alpine
  <<: *node_cache
  before_script:
    - npm ci
  artifacts:
    paths:
      - dist/mftrade/browser
    expire_in: 1 hour

.deploy_template: &deploy_template
  stage: deploy
  image: node:20-alpine
  before_script:
    - npm install -g vercel@latest

# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
# DEV  в†’  develop branch
# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
build:dev:
  <<: *build_template
  script:
    - npm run build:dev
  only:
    - develop

deploy:dev:
  <<: *deploy_template
  script:
    - export VERCEL_PROJECT_ID=$VERCEL_PROJECT_ID_DEV
    - export VERCEL_ORG_ID=$VERCEL_ORG_ID
    - vercel deploy dist/mftrade/browser --token=$VERCEL_TOKEN --yes
  environment:
    name: dev
    url: https://mftrade-dev.vercel.app
  needs: [build:dev]
  only:
    - develop

# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
# SIT  в†’  sit branch
# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
