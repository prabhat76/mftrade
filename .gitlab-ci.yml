stages:
  - build
  - deploy

.node_cache: &node_cache
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/

.build_template: &build_template
  stage: build
  image: node:20-alpine
  <<: *node_cache
  before_script:
    - npm ci
  artifacts:
    paths:
      - dist/mftrade/browser
    expire_in: 1 hour

.deploy_template: &deploy_template
  stage: deploy
  image: node:20-alpine
  before_script:
    - npm install -g vercel@latest

# ═══════════════════════════════════════════════════════════════
# DEV — auto deploys on every push to develop
# ═══════════════════════════════════════════════════════════════
build:dev:
  <<: *build_template
  script:
    - npm run build:dev
  only:
    - develop

deploy:dev:
  <<: *deploy_template
  script:
    - export VERCEL_ORG_ID=$VERCEL_ORG_ID
    - export VERCEL_PROJECT_ID=$VERCEL_PROJECT_ID_DEV
    - vercel deploy dist/mftrade/browser --token=$VERCEL_TOKEN --yes
  environment:
    name: dev
    url: https://mftrade-dev.vercel.app
  needs: [build:dev]
  only:
    - develop
  # No when: manual → runs automatically

# ═══════════════════════════════════════════════════════════════
# SIT — only triggers when a MR is merged into sit branch
#       deploy step requires manual click (CR approval gate)
# ═══════════════════════════════════════════════════════════════
build:sit:
  <<: *build_template
  script:
    - npm run build:sit
  only:
    refs:
      - sit
    variables:
      - $CI_PIPELINE_SOURCE == "push"

deploy:sit:
  <<: *deploy_template
  script:
    - export VERCEL_ORG_ID=$VERCEL_ORG_ID
    - export VERCEL_PROJECT_ID=$VERCEL_PROJECT_ID_SIT
    - vercel deploy dist/mftrade/browser --token=$VERCEL_TOKEN --yes
  environment:
    name: sit
    url: https://mftrade-sit.vercel.app
  needs: [build:sit]
  only:
    refs:
      - sit
    variables:
      - $CI_PIPELINE_SOURCE == "push"
  when: manual   # ← must click Deploy in GitLab after CR is merged

# ═══════════════════════════════════════════════════════════════
# STAGE — MR into staging + manual deploy click
# ═══════════════════════════════════════════════════════════════
build:stage:
  <<: *build_template
  script:
    - npm run build:stage
  only:
    refs:
      - staging
    variables:
      - $CI_PIPELINE_SOURCE == "push"

deploy:stage:
  <<: *deploy_template
  script:
    - export VERCEL_ORG_ID=$VERCEL_ORG_ID
    - export VERCEL_PROJECT_ID=$VERCEL_PROJECT_ID_STAGE
    - vercel deploy dist/mftrade/browser --token=$VERCEL_TOKEN --yes
  environment:
    name: stage
    url: https://mftrade-stage.vercel.app
  needs: [build:stage]
  only:
    refs:
      - staging
    variables:
      - $CI_PIPELINE_SOURCE == "push"
  when: manual

# ═══════════════════════════════════════════════════════════════
# PAT — MR into pat + manual deploy click
# ═══════════════════════════════════════════════════════════════
build:pat:
  <<: *build_template
  script:
    - npm run build:pat
  only:
    refs:
      - pat
    variables:
      - $CI_PIPELINE_SOURCE == "push"

deploy:pat:
  <<: *deploy_template
  script:
    - export VERCEL_ORG_ID=$VERCEL_ORG_ID
    - export VERCEL_PROJECT_ID=$VERCEL_PROJECT_ID_PAT
    - vercel deploy dist/mftrade/browser --token=$VERCEL_TOKEN --yes
  environment:
    name: pat
    url: https://mftrade-pat.vercel.app
  needs: [build:pat]
  only:
    refs:
      - pat
    variables:
      - $CI_PIPELINE_SOURCE == "push"
  when: manual

# ═══════════════════════════════════════════════════════════════
# PRODUCTION — MR into main + manual deploy click
# ═══════════════════════════════════════════════════════════════
build:prod:
  <<: *build_template
  script:
    - npm run build:prod
  only:
    refs:
      - main
    variables:
      - $CI_PIPELINE_SOURCE == "push"

deploy:prod:
  <<: *deploy_template
  script:
    - export VERCEL_ORG_ID=$VERCEL_ORG_ID
    - export VERCEL_PROJECT_ID=$VERCEL_PROJECT_ID_PROD
    - vercel deploy dist/mftrade/browser --token=$VERCEL_TOKEN --prod --yes
  environment:
    name: production
    url: https://mftrade-prod.vercel.app
  needs: [build:prod]
  only:
    refs:
      - main
    variables:
      - $CI_PIPELINE_SOURCE == "push"
  when: manual
