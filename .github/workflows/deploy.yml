name: Deploy to Vercel

on:
  push:
    branches:
      - develop
      - sit
      - staging
      - pat
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # ── DEV ──────────────────────────────────────────────────────────────
      - name: Build [dev]
        if: github.ref_name == 'develop'
        run: npm run build:dev
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DEV }}

      - name: Deploy [dev]
        if: github.ref_name == 'develop'
        run: |
          vercel build --token=${{ secrets.VERCEL_TOKEN }} --yes
          vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DEV }}

      # ── SIT ──────────────────────────────────────────────────────────────
      - name: Build [sit]
        if: github.ref_name == 'sit'
        run: npm run build:sit
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_SIT }}

      - name: Deploy [sit]
        if: github.ref_name == 'sit'
        run: |
          vercel build --token=${{ secrets.VERCEL_TOKEN }} --yes
          vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_SIT }}

      # ── STAGE ────────────────────────────────────────────────────────────
      - name: Build [stage]
        if: github.ref_name == 'staging'
        run: npm run build:stage
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_STAGE }}

      - name: Deploy [stage]
        if: github.ref_name == 'staging'
        run: |
          vercel build --token=${{ secrets.VERCEL_TOKEN }} --yes
          vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_STAGE }}

      # ── PAT ──────────────────────────────────────────────────────────────
      - name: Build [pat]
        if: github.ref_name == 'pat'
        run: npm run build:pat
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PAT }}

      - name: Deploy [pat]
        if: github.ref_name == 'pat'
        run: |
          vercel build --token=${{ secrets.VERCEL_TOKEN }} --yes
          vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PAT }}

      # ── PRODUCTION ───────────────────────────────────────────────────────
      - name: Build [prod]
        if: github.ref_name == 'main'
        run: npm run build:prod
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PROD }}

      - name: Deploy [prod]
        if: github.ref_name == 'main'
        run: |
          vercel build --token=${{ secrets.VERCEL_TOKEN }} --yes
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PROD }}
