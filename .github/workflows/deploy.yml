name: Deploy to Vercel

on:
  push:
    branches:
      - develop
      - sit
      - staging
      - pat
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # Debug — confirms secrets are reaching the runner (values stay masked)
      - name: Debug secret presence
        run: |
          echo "VERCEL_TOKEN is set: ${{ secrets.VERCEL_TOKEN != '' }}"
          echo "VERCEL_ORG_ID is set: ${{ secrets.VERCEL_ORG_ID != '' }}"
          echo "Branch: ${{ github.ref_name }}"

      # Write token to vercel global config so CLI picks it up automatically
      - name: Configure Vercel credentials
        run: |
          mkdir -p ~/.local/share/com.vercel.cli
          echo '{"token":"${{ secrets.VERCEL_TOKEN }}"}' > ~/.local/share/com.vercel.cli/auth.json

      # ── DEV ──────────────────────────────────────────────────────────────
      - name: Build [dev]
        if: github.ref_name == 'develop'
        run: npm run build:dev

      - name: Deploy [dev]
        if: github.ref_name == 'develop'
        run: |
          vercel deploy dist/mftrade/browser --yes \
            --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DEV }}

      # ── SIT ──────────────────────────────────────────────────────────────
      - name: Build [sit]
        if: github.ref_name == 'sit'
        run: npm run build:sit

      - name: Deploy [sit]
        if: github.ref_name == 'sit'
        run: |
          vercel deploy dist/mftrade/browser --yes \
            --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_SIT }}

      # ── STAGE ────────────────────────────────────────────────────────────
      - name: Build [stage]
        if: github.ref_name == 'staging'
        run: npm run build:stage

      - name: Deploy [stage]
        if: github.ref_name == 'staging'
        run: |
          vercel deploy dist/mftrade/browser --yes \
            --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_STAGE }}

      # ── PAT ──────────────────────────────────────────────────────────────
      - name: Build [pat]
        if: github.ref_name == 'pat'
        run: npm run build:pat

      - name: Deploy [pat]
        if: github.ref_name == 'pat'
        run: |
          vercel deploy dist/mftrade/browser --yes \
            --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PAT }}

      # ── PRODUCTION ───────────────────────────────────────────────────────
      - name: Build [prod]
        if: github.ref_name == 'main'
        run: npm run build:prod

      - name: Deploy [prod]
        if: github.ref_name == 'main'
        run: |
          vercel deploy dist/mftrade/browser --prod --yes \
            --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PROD }}
