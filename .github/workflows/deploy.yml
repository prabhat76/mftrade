name: Deploy to Vercel

on:
  push:
    branches:
      - develop   # auto build + auto deploy

  # Manual trigger for all other envs
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - sit
          - staging
          - pat
          - production

jobs:
  # ═══════════════════════════════════════════════════════
  # AUTO — develop only, no manual step needed
  # ═══════════════════════════════════════════════════════
  deploy-dev:
    if: github.event_name == 'push' && github.ref_name == 'develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm install -g vercel@latest

      - name: Build + Deploy [dev]
        run: |
          mkdir -p .vercel
          printf '{"projectId":"%s","orgId":"%s"}' "$PROJ_ID" "$ORG_ID" > .vercel/project.json
          npm run build:dev
          vercel build --token="$VERCEL_TOKEN" --yes
          vercel deploy --prebuilt --token="$VERCEL_TOKEN" --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          PROJ_ID: ${{ secrets.VERCEL_PROJECT_ID_DEV }}

  # ═══════════════════════════════════════════════════════
  # MANUAL — triggered via workflow_dispatch only
  # Go to Actions → Deploy to Vercel → Run workflow
  # Pick environment from dropdown
  # ═══════════════════════════════════════════════════════
  deploy-manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.environment == 'production' && 'main' || github.event.inputs.environment == 'staging' && 'staging' || github.event.inputs.environment }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm install -g vercel@latest

      - name: Build + Deploy [sit]
        if: github.event.inputs.environment == 'sit'
        run: |
          mkdir -p .vercel
          printf '{"projectId":"%s","orgId":"%s"}' "$PROJ_ID" "$ORG_ID" > .vercel/project.json
          npm run build:sit
          vercel build --token="$VERCEL_TOKEN" --yes
          vercel deploy --prebuilt --token="$VERCEL_TOKEN" --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          PROJ_ID: ${{ secrets.VERCEL_PROJECT_ID_SIT }}

      - name: Build + Deploy [stage]
        if: github.event.inputs.environment == 'staging'
        run: |
          mkdir -p .vercel
          printf '{"projectId":"%s","orgId":"%s"}' "$PROJ_ID" "$ORG_ID" > .vercel/project.json
          npm run build:stage
          vercel build --token="$VERCEL_TOKEN" --yes
          vercel deploy --prebuilt --token="$VERCEL_TOKEN" --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          PROJ_ID: ${{ secrets.VERCEL_PROJECT_ID_STAGE }}

      - name: Build + Deploy [pat]
        if: github.event.inputs.environment == 'pat'
        run: |
          mkdir -p .vercel
          printf '{"projectId":"%s","orgId":"%s"}' "$PROJ_ID" "$ORG_ID" > .vercel/project.json
          npm run build:pat
          vercel build --token="$VERCEL_TOKEN" --yes
          vercel deploy --prebuilt --token="$VERCEL_TOKEN" --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          PROJ_ID: ${{ secrets.VERCEL_PROJECT_ID_PAT }}

      - name: Build + Deploy [prod]
        if: github.event.inputs.environment == 'production'
        run: |
          mkdir -p .vercel
          printf '{"projectId":"%s","orgId":"%s"}' "$PROJ_ID" "$ORG_ID" > .vercel/project.json
          npm run build:prod
          vercel build --prod --token="$VERCEL_TOKEN" --yes
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          PROJ_ID: ${{ secrets.VERCEL_PROJECT_ID_PROD }}
