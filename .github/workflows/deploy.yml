name: Deploy to Vercel

on:
  push:
    branches:
      - develop   # auto deploy
      - sit       # manual deploy after CR
      - staging   # manual deploy after CR
      - pat       # manual deploy after CR
      - main      # manual deploy after CR

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # ── DEV ────────────────────────────────────────────────────────────────
      - name: Build [dev]
        if: github.ref_name == 'develop'
        run: npm run build:dev

      - name: Deploy [dev]
        if: github.ref_name == 'develop'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DEV }}
        run: vercel deploy dist/mftrade/browser --token=$VERCEL_TOKEN --yes

      # ── SIT ────────────────────────────────────────────────────────────────
      - name: Build [sit]
        if: github.ref_name == 'sit'
        run: npm run build:sit

      - name: Deploy [sit]
        if: github.ref_name == 'sit'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_SIT }}
        run: vercel deploy dist/mftrade/browser --token=$VERCEL_TOKEN --yes

      # ── STAGE ──────────────────────────────────────────────────────────────
      - name: Build [stage]
        if: github.ref_name == 'staging'
        run: npm run build:stage

      - name: Deploy [stage]
        if: github.ref_name == 'staging'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_STAGE }}
        run: vercel deploy dist/mftrade/browser --token=$VERCEL_TOKEN --yes

      # ── PAT ────────────────────────────────────────────────────────────────
      - name: Build [pat]
        if: github.ref_name == 'pat'
        run: npm run build:pat

      - name: Deploy [pat]
        if: github.ref_name == 'pat'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PAT }}
        run: vercel deploy dist/mftrade/browser --token=$VERCEL_TOKEN --yes

      # ── PRODUCTION ─────────────────────────────────────────────────────────
      - name: Build [prod]
        if: github.ref_name == 'main'
        run: npm run build:prod

      - name: Deploy [prod]
        if: github.ref_name == 'main'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PROD }}
        run: vercel deploy dist/mftrade/browser --token=$VERCEL_TOKEN --prod --yes
