name: Deploy to Vercel

on:
  push:
    branches:
      - develop
      - sit
      - staging
      - pat
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # ── DEV ──────────────────────────────────────────────────────────────
      - name: Build + Deploy [dev]
        if: github.ref_name == 'develop'
        run: |
          mkdir -p .vercel
          printf '{"projectId":"%s","orgId":"%s"}' \
            "$PROJ_ID" "$ORG_ID" > .vercel/project.json
          npm run build:dev
          vercel build --token="$VERCEL_TOKEN" --yes
          vercel deploy --prebuilt --token="$VERCEL_TOKEN" --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          PROJ_ID: ${{ secrets.VERCEL_PROJECT_ID_DEV }}

      # ── SIT ──────────────────────────────────────────────────────────────
      - name: Build + Deploy [sit]
        if: github.ref_name == 'sit'
        run: |
          mkdir -p .vercel
          printf '{"projectId":"%s","orgId":"%s"}' \
            "$PROJ_ID" "$ORG_ID" > .vercel/project.json
          npm run build:sit
          vercel build --token="$VERCEL_TOKEN" --yes
          vercel deploy --prebuilt --token="$VERCEL_TOKEN" --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          PROJ_ID: ${{ secrets.VERCEL_PROJECT_ID_SIT }}

      # ── STAGE ────────────────────────────────────────────────────────────
      - name: Build + Deploy [stage]
        if: github.ref_name == 'staging'
        run: |
          mkdir -p .vercel
          printf '{"projectId":"%s","orgId":"%s"}' \
            "$PROJ_ID" "$ORG_ID" > .vercel/project.json
          npm run build:stage
          vercel build --token="$VERCEL_TOKEN" --yes
          vercel deploy --prebuilt --token="$VERCEL_TOKEN" --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          PROJ_ID: ${{ secrets.VERCEL_PROJECT_ID_STAGE }}

      # ── PAT ──────────────────────────────────────────────────────────────
      - name: Build + Deploy [pat]
        if: github.ref_name == 'pat'
        run: |
          mkdir -p .vercel
          printf '{"projectId":"%s","orgId":"%s"}' \
            "$PROJ_ID" "$ORG_ID" > .vercel/project.json
          npm run build:pat
          vercel build --token="$VERCEL_TOKEN" --yes
          vercel deploy --prebuilt --token="$VERCEL_TOKEN" --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          PROJ_ID: ${{ secrets.VERCEL_PROJECT_ID_PAT }}

      # ── PRODUCTION ───────────────────────────────────────────────────────
      - name: Build + Deploy [prod]
        if: github.ref_name == 'main'
        run: |
          mkdir -p .vercel
          printf '{"projectId":"%s","orgId":"%s"}' \
            "$PROJ_ID" "$ORG_ID" > .vercel/project.json
          npm run build:prod
          vercel build --token="$VERCEL_TOKEN" --yes
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          PROJ_ID: ${{ secrets.VERCEL_PROJECT_ID_PROD }}
