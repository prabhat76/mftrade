name: Deploy to Vercel

on:
  push:
    branches:
      - develop    # auto deploy
      - sit        # requires PR/CR merged
      - staging    # requires PR/CR merged
      - pat        # requires PR/CR merged
      - main       # requires PR/CR merged + manual approval

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve environment from branch
        id: cfg
        run: |
          case "${{ github.ref_name }}" in
            main)
              echo "build=build:prod"                                        >> $GITHUB_OUTPUT
              echo "project_id=${{ secrets.VERCEL_PROJECT_ID_PROD }}"       >> $GITHUB_OUTPUT
              echo "env_name=production"                                     >> $GITHUB_OUTPUT
              echo "is_prod=true"                                            >> $GITHUB_OUTPUT
              ;;
            develop)
              echo "build=build:dev"                                         >> $GITHUB_OUTPUT
              echo "project_id=${{ secrets.VERCEL_PROJECT_ID_DEV }}"        >> $GITHUB_OUTPUT
              echo "env_name=dev"                                            >> $GITHUB_OUTPUT
              echo "is_prod=false"                                           >> $GITHUB_OUTPUT
              ;;
            sit)
              echo "build=build:sit"                                         >> $GITHUB_OUTPUT
              echo "project_id=${{ secrets.VERCEL_PROJECT_ID_SIT }}"        >> $GITHUB_OUTPUT
              echo "env_name=sit"                                            >> $GITHUB_OUTPUT
              echo "is_prod=false"                                           >> $GITHUB_OUTPUT
              ;;
            staging)
              echo "build=build:stage"                                       >> $GITHUB_OUTPUT
              echo "project_id=${{ secrets.VERCEL_PROJECT_ID_STAGE }}"      >> $GITHUB_OUTPUT
              echo "env_name=stage"                                          >> $GITHUB_OUTPUT
              echo "is_prod=false"                                           >> $GITHUB_OUTPUT
              ;;
            pat)
              echo "build=build:pat"                                         >> $GITHUB_OUTPUT
              echo "project_id=${{ secrets.VERCEL_PROJECT_ID_PAT }}"        >> $GITHUB_OUTPUT
              echo "env_name=pat"                                            >> $GITHUB_OUTPUT
              echo "is_prod=false"                                           >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Build → ${{ steps.cfg.outputs.env_name }}
        run: npm run ${{ steps.cfg.outputs.build }}

      - name: Deploy preview (non-prod)
        if: steps.cfg.outputs.is_prod == 'false'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ steps.cfg.outputs.project_id }}
        run: vercel deploy dist/mftrade/browser --token=${{ secrets.VERCEL_TOKEN }} --yes

      - name: Deploy production
        if: steps.cfg.outputs.is_prod == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ steps.cfg.outputs.project_id }}
        run: vercel deploy dist/mftrade/browser --token=${{ secrets.VERCEL_TOKEN }} --prod --yes
